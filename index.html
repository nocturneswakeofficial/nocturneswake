<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NOCTURNE'S WAKE | Official</title>

    <!-- FAVICON -->
    <link rel="icon" href="/nocturneswake/favicon.png" type="image/png">

    <!-- SEO -->
    <meta name="description" content="Nocturne's Wake es un proyecto musical de simbiosis humano-digital. We Don't Break.">
    <meta name="keywords" content="Nocturne's Wake, banda virtual, rock, AI music, art rock">
    <meta name="author" content="Nocturne's Wake">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* FONDO */
        .hero-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('banda.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* SELECTOR IDIOMA */
        .lang-switch {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
        }

        .lang-switch button {
            background: rgba(0,0,0,0.7);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            padding: 6px 12px;
            margin-right: 5px;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .lang-switch button:hover {
            background: #D4AF37;
            color: #000;
        }

        /* NAV */
        .nav-container {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-button {
            background: rgba(0, 0, 0, 0.82);
            color: #fff;
            text-decoration: none;
            padding: 14px 22px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
            min-width: 180px;
            transition: 0.3s ease;
        }

        .nav-button:hover {
            background: #fff;
            color: #000;
        }

        .btn-info {
            border-color: #D4AF37;
            color: #D4AF37;
        }

        .btn-info:hover {
            background: #D4AF37;
            color: #000;
        }

        /* CONTENIDO */
        .main-content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
        }

        .main-logo {
            width: 220px;
            max-width: 80%;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 8px;
            margin-bottom: 20px;
        }

        .bio-box {
            max-width: 700px;
            background: rgba(0,0,0,0.86);
            padding: 35px 40px;
            border-top: 2px solid #D4AF37;
            line-height: 1.85;
            font-size: 1.08rem;
        }

        .cta {
            margin-top: 20px;
            display: inline-block;
            border: 1px solid #D4AF37;
            padding: 12px 28px;
            color: #D4AF37;
            text-decoration: none;
            letter-spacing: 2px;
            font-size: 12px;
        }

        .cta:hover {
            background: #D4AF37;
            color: #000;
        }

        /* OVERLAY */
        .info-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 100;
            overflow-y: auto;
            padding: 60px 20px;
        }

        .info-overlay.active {
            display: block;
        }

        .close-btn {
            display: block;
            margin: 40px auto;
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            padding: 12px 30px;
            cursor: pointer;
        }

    </style>
</head>

<body>

<div class="hero-bg"></div>

<!-- IDIOMA -->
<div class="lang-switch">
    <button onclick="setLang('es')">ES</button>
    <button onclick="setLang('en')">EN</button>
</div>

<!-- NAV -->
<nav class="nav-container">
    <a href="https://open.spotify.com/album/5gIKXA6G81ALZ2zp96e0kw" class="nav-button" target="_blank">SPOTIFY</a>
    <a href="https://www.instagram.com/nocturneswake" class="nav-button" target="_blank">INSTAGRAM</a>
    <a href="https://www.tiktok.com/@nocturneswakeofficial" class="nav-button" target="_blank">TIKTOK</a>
    <a href="https://www.youtube.com/@nocturneswake" class="nav-button" target="_blank">YOUTUBE</a>
    <a href="https://x.com/NocturnesWake" class="nav-button" target="_blank">X / TWITTER</a>
    <button onclick="openInfo()" class="nav-button btn-info">HISTORIA / INFO</button>
</nav>

<!-- MAIN -->
<main class="main-content">

    <img src="Nocturnes wake-Portada.png" class="main-logo">

    <h1>NOCTURNE'S WAKE</h1>

    <div class="bio-box" id="bioText">
        <p>Esto no es solo música.<br>Es una señal humano-digital.</p>

        <p>Nocturne's Wake es un proyecto de simbiosis humano-digital.  
        No es una banda generada por inteligencia artificial: es una obra dirigida por un autor.</p>

        <a href="https://open.spotify.com/album/5gIKXA6G81ALZ2zp96e0kw" target="_blank" class="cta">
            LISTEN NOW
        </a>
    </div>

</main>

<!-- OVERLAY -->
<div class="info-overlay" id="infoOverlay">
    <button class="close-btn" onclick="closeInfo()">CERRAR</button>
</div>

<script>
function openInfo() {
    document.getElementById('infoOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeInfo() {
    document.getElementById('infoOverlay').classList.remove('active');
    document.body.style.overflow = 'auto';
}

function setLang(lang) {
    const bio = document.getElementById('bioText');

    if (lang === 'en') {
        bio.innerHTML = `
        <p>This is not just music.<br>This is a human-digital signal.</p>
        <p>Nocturne's Wake is a human-digital symbiosis project.  
        Not an AI band — a directed artistic vision.</p>
        <a href="https://open.spotify.com/album/5gIKXA6G81ALZ2zp96e0kw" target="_blank" class="cta">LISTEN NOW</a>
        `;
    } else {
        bio.innerHTML = `
        <p>Esto no es solo música.<br>Es una señal humano-digital.</p>
        <p>Nocturne's Wake es un proyecto de simbiosis humano-digital.  
        No es una banda generada por inteligencia artificial: es una obra dirigida por un autor.</p>
        <a href="https://open.spotify.com/album/5gIKXA6G81ALZ2zp96e0kw" target="_blank" class="cta">LISTEN NOW</a>
        `;
    }
}
</script>

</body>
</html>
