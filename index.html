<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocturne's Wake | Official Site</title>
    <style>
        /* RESET GENERAL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #000; 
            color: #fff;
            overflow: hidden; 
        }

        /* FONDO TOTAL (banda.jpg) */
        .full-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('banda.jpg') no-repeat center center fixed;
            background-size: cover;
            filter: brightness(35%) contrast(110%);
            z-index: 1;
        }

        /* CONTENIDO CENTRAL */
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* FOTO PEQUEÑA (Portada con logo) */
        .logo-small {
            width: 280px; 
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        h1 { 
            font-size: 2.5rem; 
            letter-spacing: 8px; 
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
        }

        .bio {
            max-width: 550px;
            font-size: 1rem;
            line-height: 1.6;
            color: #ccc;
            background: rgba(0,0,0,0.6);
            padding: 25px;
            border-left: 3px solid #444;
        }

        /* MENÚ DERECHA (ACCESOS DIRECTOS) */
        .nav-right {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .nav-right a {
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            writing-mode: vertical-rl;
            opacity: 0.5;
            transition: 0.4s ease;
        }

        .nav-right a:hover { 
            opacity: 1; 
            color: #ff0033;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .nav-right { right: 15px; }
            .logo-small { width: 200px; }
        }
    </style>
</head>
<body>

    <div class="full-bg"></div>

    <nav class="nav-right">
        <a href="https://distrokid.com/hyperfollow/nocturneswake/we-dont-break" target="_blank">SPOTIFY</a>
        <a href="https://www.instagram.com/nocturneswake" target="_blank">INSTAGRAM</a>
        <a href="https://www.tiktok.com/@nocturneswakeofficial" target="_blank">TIKTOK</a>
        <a href="https://www.youtube.com/@nocturneswake" target="_blank">YOUTUBE</a>
        <a href="https://x.com/nocturneswake" target="_blank">X / TWITTER</a>
    </nav>

    <div class="content">
        <img src="Nocturnes Wake-Portada.jpg" class="logo-small" alt="Nocturne's Wake - We Don't Break">
        
        <h1>NOCTURNE'S WAKE</h1>
        
        <div class="bio">
            <p>La primera banda virtual uruguaya de rock en inglés. Una simbiosis humano-digital donde la emoción es amplificada por la máquina.</p>
        </div>
    </div>

</body>
</html>
