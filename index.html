<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOCTURNE'S WAKE | Oficial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }

        /* FONDO PRINCIPAL - Mejor visibilidad */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('banda.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(60%) contrast(120%); /* Ahora sí se verá la banda */
            z-index: 1;
        }

        /* CAPA DE GRADIENTE PARA TEXTO */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
        }

        /* CONTENEDOR DE NAVEGACIÓN (BOTONES LLAMATIVOS A LA DERECHA) */
        .nav-container {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-button {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            padding: 12px 25px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.4);
            transition: all 0.3s ease;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .nav-button:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
        }

        /* BLOQUE CENTRAL */
        .main-content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .main-logo {
            width: 350px;
            max-width: 90%;
            margin-bottom: 30px;
            border: 2px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .bio-text {
            max-width: 700px;
            background: rgba(0,0,0,0.85);
            padding: 40px;
            border: 1px solid #333;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .bio-text b { color: #ff0033; } /* Color de acento para Nocturne's Wake */

        @media (max-width: 768px) {
            .nav-container { position: relative; right: 0; top: 0; transform: none; flex-direction: row; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
            h1 { font-size: 2rem; }
            .main-content { height: auto; padding-top: 50px; }
        }
    </style>
</head>
<body>

    <div class="hero-bg">
        <div class="overlay"></div>
    </div>

    <nav class="nav-container">
        <a href="https://distrokid.com/hyperfollow/nocturneswake/we-dont-break" class="nav-button">SPOTIFY</a>
        <a href="https://www.instagram.com/nocturneswake" class="nav-button">INSTAGRAM</a>
        <a href="https://www.tiktok.com/@nocturneswakeofficial" class="nav-button">TIKTOK</a>
        <a href="https://www.youtube.com/@nocturneswake" class="nav-button">YOUTUBE</a>
        <a href="https://x.com/nocturneswake" class="nav-button">X / TWITTER</a>
    </nav>

    <main class="main-content">
        <img src="Nocturnes Wake-Portada.png" class="main-logo" alt="WE DON'T BREAK">
        
        <h1>NOCTURNE'S WAKE</h1>
        
        <div class="bio-text">
            <p>La primera banda virtual uruguaya de rock en inglés. Una <b>simbiosis humano-digital</b> donde la emoción es amplificada por la máquina. Un proyecto transmedia que redefine la conexión entre el creador y su obra.</p>
        </div>
    </main>

</body>
</html>
