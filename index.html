<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOCTURNE'S WAKE | Official</title>
<link rel="icon" href="favicon.png" type="image/png">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body, html { height:100%; background:#000; color:#fff; font-family:'Segoe UI', Arial; overflow-x:hidden; }

/* FONDO */
.hero-bg {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:url('banda.jpg') no-repeat center center;
    background-size:cover;
    z-index:1;
}

/* IDIOMA */
.lang-switch {
    position:fixed;
    top:20px; left:20px;
    z-index:20;
}
.lang-switch button {
    background:rgba(0,0,0,0.7);
    border:1px solid #D4AF37;
    color:#D4AF37;
    padding:6px 10px;
    margin-right:5px;
    cursor:pointer;
    font-size:12px;
    font-weight:bold;
}
.lang-switch button:hover { background:#D4AF37; color:#000; }

/* NAV DERECHO */
.nav-container {
    position:fixed;
    right:0;
    top:50%;
    transform:translateY(-50%);
    z-index:10;
    display:flex;
    flex-direction:column;
    gap:8px;
    padding-right:20px;
}
.nav-button {
    display:block;
    background:rgba(0,0,0,0.82);
    color:#fff;
    padding:12px 18px;
    font-size:11px;
    font-weight:bold;
    letter-spacing:1.5px;
    text-transform:uppercase;
    border:1px solid rgba(255,255,255,0.4);
    text-align:center;
    min-width:160px;
    cursor:pointer;
    text-decoration:none;
}
.nav-button:hover { background:#fff; color:#000; }
.btn-info { border-color:#D4AF37; color:#D4AF37; }
.btn-info:hover { background:#D4AF37; color:#000; }

/* NAV IZQUIERDO */
.members-nav {
    position:fixed;
    left:0;
    top:50%;
    transform:translateY(-50%);
    z-index:10;
    display:flex;
    flex-direction:column;
    gap:8px;
    padding-left:20px;
}
.member-button {
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(0,0,0,0.82);
    color:#fff;
    padding:10px 14px;
    font-size:11px;
    font-weight:bold;
    border:1px solid rgba(255,255,255,0.25);
    cursor:pointer;
}

/* MAIN */
.main-content {
    position:relative;
    z-index:5;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    text-align:center;
    padding:20px 200px;
}

.main-logo {
    width:180px;
    opacity:0.85;
    margin-bottom:22px;
}

h1 {
    font-size:3rem;
    letter-spacing:8px;
    margin-bottom:20px;
}

.bio-box {
    max-width:680px;
    background:rgba(0,0,0,0.86);
    padding:32px 38px;
    border-top:2px solid #D4AF37;
    line-height:1.8;
}

.brush-quote {
    display:block;
    margin-top:15px;
    color:#D4AF37;
    font-style:italic;
}

.cta {
    margin-top:20px;
    display:inline-block;
    border:1px solid #D4AF37;
    padding:10px 25px;
    color:#D4AF37;
    text-decoration:none;
    cursor:pointer;
}
.cta:hover { background:#D4AF37; color:#000; }
</style>
</head>

<body>

<div class="hero-bg"></div>

<div class="lang-switch">
    <button onclick="setLang('es')">ES</button>
    <button onclick="setLang('en')">EN</button>
</div>

<nav class="nav-container">
    <a href="https://open.spotify.com/album/5gIKXA6G81ALZ2zp96e0kw" class="nav-button" target="_blank">SPOTIFY</a>
    <a href="https://www.instagram.com/nocturneswake" class="nav-button" target="_blank">INSTAGRAM</a>
    <a href="https://www.tiktok.com/@nocturneswakeofficial" class="nav-button" target="_blank">TIKTOK</a>
    <a href="https://www.youtube.com/@nocturneswake" class="nav-button" target="_blank">YOUTUBE</a>
    <button class="nav-button btn-info">HISTORIA / INFO</button>
</nav>

<nav class="members-nav">
    <button class="member-button">DORIAN</button>
    <button class="member-button">CAL</button>
    <button class="member-button">MARCUS</button>
    <button class="member-button">RÍAN</button>
</nav>

<main class="main-content">

    <!-- MICRO HOOK -->
    <div style="font-size:12px; letter-spacing:2px; opacity:0.7; margin-bottom:10px;">
        YOU'RE NOT HERE BY ACCIDENT
    </div>

    <img src="Nocturnes Wake-Portada.png" class="main-logo">

    <h1>NOCTURNE'S WAKE</h1>

    <div class="bio-box" id="bioText">

        <p><strong>If you feel too much at night… this is for you.</strong></p>

        <p>
        This is not meant to be understood.<br>
        It’s meant to stay with you.
        </p>

        <span class="brush-quote">
        "A signal doesn't ask for permission.<br>
        It finds you."
        </span>

        <a href="https://open.spotify.com/album/5gIKXA6G81ALZ2zp96e0kw" target="_blank" class="cta">
        ENTER THE SOUND
        </a>

        <br><br>

        <button onclick="toggleAudio()" class="cta">
        ACTIVATE SOUND
        </button>

    </div>

</main>

<audio id="bgAudio" loop>
    <source src="audio-preview.mp3" type="audio/mpeg">
</audio>

<script>
let audioPlaying = false;

function toggleAudio() {
    const audio = document.getElementById("bgAudio");
    if (!audioPlaying) {
        audio.volume = 0.4;
        audio.play();
        audioPlaying = true;
    } else {
        audio.pause();
        audioPlaying = false;
    }
}

function setLang(lang) {
    const bio = document.getElementById('bioText');
    if (lang === 'en') {
        bio.innerHTML = `
        <p><strong>If you feel too much at night… this is for you.</strong></p>
        <p>This is not meant to be understood.<br>It’s meant to stay with you.</p>
        <span class="brush-quote">"A signal doesn't ask for permission.<br>It finds you."</span>
        <a href="#" class="cta">ENTER THE SOUND</a>
        <br><br>
        <button onclick="toggleAudio()" class="cta">ACTIVATE SOUND</button>
        `;
    } else {
        bio.innerHTML = `
        <p><strong>Si sentís demasiado por la noche… esto es para vos.</strong></p>
        <p>No está hecho para entenderse.<br>Está hecho para quedarse con vos.</p>
        <span class="brush-quote">"Una señal no pide permiso.<br>Te encuentra."</span>
        <a href="#" class="cta">ENTRAR AL SONIDO</a>
        <br><br>
        <button onclick="toggleAudio()" class="cta">ACTIVAR SONIDO</button>
        `;
    }
}
</script>

</body>
</html>
