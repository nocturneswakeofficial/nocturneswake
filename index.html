<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOCTURNE'S WAKE | Official</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body, html { height:100%; background:#000; color:#fff; font-family:'Segoe UI', Arial; overflow-x:hidden; }

/* FONDO */
.hero-bg {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:url('banda.jpg') no-repeat center center;
    background-size:cover;
    z-index:1;
}

/* MAIN */
.main-content {
    position:relative;
    z-index:5;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    text-align:center;
    padding:20px;
}

.main-logo {
    width:160px;
    opacity:0.9;
    margin-bottom:20px;
}

h1 {
    font-size:2.8rem;
    letter-spacing:6px;
    margin-bottom:15px;
}

/* BLOQUE CENTRAL */
.bio-box {
    max-width:600px;
    background:rgba(0,0,0,0.82);
    padding:30px;
    border-top:2px solid #D4AF37;
    line-height:1.7;
}

/* MICRO HOOK */
.micro-hook {
    font-size:11px;
    letter-spacing:2px;
    opacity:0.7;
    margin-bottom:10px;
}

/* CTA */
.cta {
    margin-top:20px;
    display:inline-block;
    border:1px solid #D4AF37;
    padding:10px 25px;
    color:#D4AF37;
    text-decoration:none;
    cursor:pointer;
}
.cta:hover { background:#D4AF37; color:#000; }

.brush-quote {
    display:block;
    margin-top:15px;
    color:#D4AF37;
    font-style:italic;
}
</style>
</head>

<body>

<div class="hero-bg"></div>

<main class="main-content">

    <div class="micro-hook">
        YOU'RE NOT HERE BY ACCIDENT
    </div>

    <img src="Nocturnes Wake-Portada.png" class="main-logo">

    <h1>NOCTURNE'S WAKE</h1>

    <div class="bio-box">

        <p><strong>If you feel too much at night… this is for you.</strong></p>

        <p>
        This is not meant to be understood.<br>
        It’s meant to stay with you.
        </p>

        <span class="brush-quote">
        "A signal doesn't ask for permission.<br>
        It finds you."
        </span>

        <br>

        <a href="https://open.spotify.com/album/5gIKXA6G81ALZ2zp96e0kw" target="_blank" class="cta">
            ENTER THE SOUND
        </a>

        <br>

        <button onclick="toggleAudio()" class="cta">
            ACTIVATE SOUND
        </button>

    </div>

</main>

<!-- AUDIO -->
<audio id="bgAudio" loop>
    <source src="audio-preview.mp3" type="audio/mpeg">
</audio>

<script>
let audioPlaying = false;

function toggleAudio() {
    const audio = document.getElementById("bgAudio");

    if (!audioPlaying) {
        audio.volume = 0.4;
        audio.play();
        audioPlaying = true;
    } else {
        audio.pause();
        audioPlaying = false;
    }
}
</script>

</body>
</html>
