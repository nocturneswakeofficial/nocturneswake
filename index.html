<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOCTURNE'S WAKE | Official</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; color: #fff; font-family: Arial, sans-serif; overflow-x: hidden; }

        /* FONDO: Visible y nítido */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('banda.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(70%); /* Nivel justo para que se vean los rostros */
            z-index: 1;
        }

        /* NAVEGACIÓN: Botones reales y legibles a la derecha */
        .nav-container {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-button {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            text-decoration: none;
            padding: 15px 20px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid #fff;
            text-align: center;
            min-width: 140px;
            transition: 0.3s;
        }

        .nav-button:hover {
            background: #fff;
            color: #000;
        }

        /* BLOQUE CENTRAL */
        .main-content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* PORTADA: Sin marcos extraños */
        .main-logo {
            width: 320px;
            max-width: 85%;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .bio-text {
            max-width: 650px;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            line-height: 1.6;
            font-size: 1.1rem;
            border-top: 2px solid #fff;
        }

        @media (max-width: 768px) {
            .nav-container { position: relative; right: 0; top: 0; transform: none; margin-top: 20px; }
            h1 { font-size: 2rem; }
            .main-content { height: auto; }
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <nav class="nav-container">
        <a href="https://distrokid.com/hyperfollow/nocturneswake/we-dont-break" class="nav-button" target="_blank">SPOTIFY</a>
        <a href="https://www.instagram.com/nocturneswake" class="nav-button" target="_blank">INSTAGRAM</a>
        <a href="https://www.tiktok.com/@nocturneswakeofficial" class="nav-button" target="_blank">TIKTOK</a>
        <a href="https://www.youtube.com/@nocturneswake" class="nav-button" target="_blank">YOUTUBE</a>
        <a href="https://x.com/nocturneswake" class="nav-button" target="_blank">X / TWITTER</a>
    </nav>

    <main class="main-content">
        <img src="Nocturnes Wake-Portada.png" class="main-logo" alt="Nocturne's Wake - We Don't Break">
        
        <h1>NOCTURNE'S WAKE</h1>
        
        <div class="bio-text">
            <p>La primera banda virtual uruguaya de rock en inglés[cite: 6, 10, 82]. Una <b>simbiosis humano-digital</b> donde la emoción es amplificada por la máquina[cite: 18, 25, 48]. <b>WE DON'T BREAK</b>[cite: 32, 62].</p>
        </div>
    </main>

</body>
</html>
